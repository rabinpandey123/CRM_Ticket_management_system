<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Edit Ticket</h2>
    <form method="POST" action="/Ticket/Edit">
        <input type="hidden" name="Id" id="ticketId" />
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="Title" id="ticketTitle" class="form-control" required />
        </div>
        <div class="mb-3">
            <label>Description</label>
            <textarea name="Description" id="ticketDescription" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
            <label>Status</label>
            <select name="Status" id="ticketStatus" class="form-control">
                <option value="Open">Open</option>
                <option value="InProgress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="/Ticket/Index" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
